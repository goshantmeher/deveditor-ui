name: CI

# Run on pull_request (one run per PR update). Run on push only to main (for version & publish after merge).
# This avoids duplicate runs: pushing to a PR branch triggers only pull_request, not push.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

  changeset_required:
    name: Changeset required
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check changesets
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.sha }}
        run: bash scripts/check-changesets.sh

  main_only_from_master:
    name: Main only from allowed branches
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Ensure only master or changeset-release/main can merge to main
        run: |
          ALLOWED="master changeset-release/main"
          if echo "$ALLOWED" | grep -qw "${{ github.head_ref }}"; then
            echo "Branch '${{ github.head_ref }}' is allowed to merge into main."
          else
            echo "::error::Only 'master' or 'changeset-release/main' can be merged into 'main'. This PR is from '${{ github.head_ref }}'."
            exit 1
          fi

  publish:
    name: Version & publish (npm)
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
